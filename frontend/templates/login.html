{% extends "base.html" %}
{% block title %}Login — IoT Analytics Platform{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h1>IoT Analytics Platform</h1>
        <p class="login-subtitle">Sign in to access your telemetry dashboard</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <div class="sso-divider">
            <span>or</span>
        </div>
        <a href="/auth/saml/acs/" class="btn btn-secondary btn-full">Sign in with SSO</a>
    </div>
</div>
{% endblock %}
